# Daily MLB regular-season (game type R) ingest → Google Drive
#
# How data is saved
# -----------------
# 1. rclone pulls the existing tree from Drive into the runner:
#      ./data/warehouse/mlb/  (ephemeral; same layout as below)
# 2. load_mlb_warehouse writes new/updated games under:
#      ./data/warehouse/mlb/{MLB_SEASON}/regular_season/raw/
#      ./data/warehouse/mlb/{MLB_SEASON}/regular_season/pitches_enriched/
#      ./data/warehouse/mlb/{MLB_SEASON}/players_registry.json
# 3. rclone sync pushes ./data/warehouse/mlb back to Drive at:
#      mallitalytics:MLB/warehouse/mlb/...  (remote name = env RCLONE_REMOTE)
#    (sync = mirror: local is source of truth for that path after ingest)
#
# Drive layout (relative to the Mallitalytics remote root / root_folder_id):
#   MLB/warehouse/mlb/
#     2026/                              MLB_SEASON (bump env below each year)
#       players_registry.json
#       regular_season/
#         raw/
#           game_{gamePk}_{YYYYMMDD}_feed_live.json.gz
#         pitches_enriched/
#           game_{gamePk}_{YYYYMMDD}_pitches_enriched.parquet
#
# Searching by date: Drive search for YYYYMMDD in filenames, or open
# MLB → warehouse → mlb → 2026 → regular_season → raw|pitches_enriched.
#
# GitHub secrets (pick ONE style — same idea as FantasyXII)
# ----------------------------------------------------------
# A) FantasyXII-style — one secret
# • RCLONE_CONFIG_BASE64 — MUST be base64 of the full rclone CONFIG file
#   (~/.config/rclone/rclone.conf), NOT base64 of the service-account *.json key alone.
#   The decoded text must contain lines like [mallitalytics] and type = drive.
#   Linux: base64 -w0 ~/.config/rclone/rclone.conf
#   macOS: base64 -i ~/.config/rclone/rclone.conf | tr -d '\n'
#   Default remote name: mallitalytics. Override RCLONE_REMOTE if needed.
#
# B) Split secrets (what this workflow generated before)
# • GDRIVE_SERVICE_ACCOUNT — full SA JSON or base64-of-JSON (see below).
# • GDRIVE_FOLDER_ID — folder ID from the Drive URL (folders/THIS_PART).
#   Required only if RCLONE_CONFIG_BASE64 is not set.
#
#   SA JSON local base64 (macOS): base64 -i key.json | tr -d '\n'
#   Share the Drive folder with the service account email (Editor).
#
# Migrating from old remote root `mlb-warehouse`: e.g.
#   rclone copy mallitalytics:mlb-warehouse mallitalytics:MLB/warehouse/mlb

name: Daily MLB Warehouse Ingest

on:
  # 3:05 AM ET daily (7:05 UTC; adjust if you prefer strict US Eastern)
  schedule:
    - cron: "5 7 * * *"

  workflow_dispatch:
    inputs:
      date:
        description: "Specific date (YYYY-MM-DD). Leave blank for last-days window."
        required: false
        default: ""
      last_days:
        description: "Ingest last N days (default 1 = typical daily catch-up)"
        required: false
        default: "1"
      season:
        description: "Season year (blank = MLB_SEASON from workflow env, default 2026)"
        required: false
        default: ""
      force:
        description: "Force re-ingest even if files exist"
        required: false
        default: false
        type: boolean

env:
  # Under the Mallitalytics Drive root (same remote as FantasyXII): MLB → warehouse → mlb.
  # If root_folder_id points at a subfolder that is already "MLB", use warehouse/mlb only.
  GDRIVE_WAREHOUSE_PATH: MLB/warehouse/mlb
  # Scheduled runs use this season (regular season, --game-type R). Change to 2027 when needed.
  MLB_SEASON: "2026"
  # Same [remote] name as FantasyXII (RCLONE_CONFIG_BASE64 / your rclone.conf).
  RCLONE_REMOTE: mallitalytics

jobs:
  ingest:
    name: Ingest MLB games and sync warehouse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone (Google Drive)
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          mkdir -p ~/.config/rclone
          if [ -n "${RCLONE_CONFIG_BASE64}" ]; then
            echo "Using RCLONE_CONFIG_BASE64 (full rclone.conf, FantasyXII-style)."
            python3 << 'PY'
          import base64
          import binascii
          import os
          import re
          import sys

          raw = os.environ.get("RCLONE_CONFIG_BASE64", "")
          b64 = "".join(raw.split())
          if not b64:
              print("::error::RCLONE_CONFIG_BASE64 is empty.", file=sys.stderr)
              sys.exit(1)
          pad = (-len(b64)) % 4
          if pad:
              b64 += "=" * pad
          try:
              data = base64.b64decode(b64, validate=False)
          except binascii.Error:
              try:
                  data = base64.urlsafe_b64decode(b64, validate=False)
              except binascii.Error:
                  print(
                      "::error::RCLONE_CONFIG_BASE64 is not valid base64. "
                      "Copy only the encoded characters (no labels, no quotes).",
                      file=sys.stderr,
                  )
                  sys.exit(1)
          try:
              text = data.decode("utf-8")
          except UnicodeDecodeError:
              print("::error::Decoded bytes are not valid UTF-8.", file=sys.stderr)
              sys.exit(1)
          t = text.lstrip("\ufeff").lstrip()
          if t.startswith("{"):
              print(
                  "::error::Decoded content is JSON (service account key), not rclone.conf. "
                  "You must base64-encode the entire rclone config file that contains [mallitalytics], "
                  "not the *.json key from Google Cloud. macOS: base64 -i ~/.config/rclone/rclone.conf | tr -d '\\n'",
                  file=sys.stderr,
              )
              sys.exit(1)
          if not re.search(r"^\[", text, re.MULTILINE):
              print(
                  "::error::Decoded file must be rclone.conf with a [remote_name] section header.",
                  file=sys.stderr,
              )
              sys.exit(1)
          path = os.path.expanduser("~/.config/rclone/rclone.conf")
          os.makedirs(os.path.dirname(path), exist_ok=True)
          with open(path, "w", encoding="utf-8") as f:
              f.write(text)
          PY
          else
            python3 << 'PY'
          import base64
          import binascii
          import json
          import os
          import sys

          def norm(t: str) -> str:
              return t.strip().lstrip("\ufeff").strip()

          def b64_to_bytes(blob: str) -> bytes:
              b64 = "".join(blob.split())
              pad = (-len(b64)) % 4
              if pad:
                  b64 += "=" * pad
              try:
                  return base64.b64decode(b64, validate=False)
              except binascii.Error:
                  return base64.urlsafe_b64decode(b64, validate=False)

          raw = os.environ.get("GDRIVE_SA_JSON", "")
          cur = norm(raw)
          if not cur:
              print("::error::Set RCLONE_CONFIG_BASE64, or GDRIVE_SERVICE_ACCOUNT + GDRIVE_FOLDER_ID.", file=sys.stderr)
              sys.exit(1)

          if len(cur) >= 2 and cur[0] == '"' and cur[-1] == '"':
              try:
                  cur = norm(json.loads(cur))
              except json.JSONDecodeError:
                  pass

          for _ in range(5):
              if cur.startswith("{") or cur.startswith("["):
                  break
              try:
                  cur = norm(b64_to_bytes(cur).decode("utf-8"))
              except (binascii.Error, UnicodeDecodeError, ValueError):
                  break

          try:
              data = json.loads(cur)
              if isinstance(data, str):
                  data = json.loads(norm(data))
              if not isinstance(data, dict):
                  raise ValueError("expected a JSON object (service account key)")
          except (json.JSONDecodeError, ValueError, TypeError):
              print(
                  "::error::GDRIVE_SERVICE_ACCOUNT: raw .json key or one-line base64 of that file. "
                  "Or use RCLONE_CONFIG_BASE64 instead.",
                  file=sys.stderr,
              )
              sys.exit(1)

          with open("/tmp/gdrive_sa.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          PY
            if [ -z "${GDRIVE_FOLDER_ID}" ]; then
              echo "::error::GDRIVE_FOLDER_ID is missing. Add it, or use RCLONE_CONFIG_BASE64 (full rclone.conf) like FantasyXII."
              exit 1
            fi
            remote="${RCLONE_REMOTE:-mallitalytics}"
            printf '%s\n' \
              "[${remote}]" \
              'type = drive' \
              'scope = drive' \
              'service_account_file = /tmp/gdrive_sa.json' \
              "root_folder_id = ${GDRIVE_FOLDER_ID}" \
              > ~/.config/rclone/rclone.conf
          fi

      - name: Sync warehouse from Google Drive
        run: |
          mkdir -p data/warehouse/mlb
          REMOTE="${RCLONE_REMOTE}:${GDRIVE_WAREHOUSE_PATH}"
          echo "Pulling warehouse from ${REMOTE} ..."
          rclone sync "$REMOTE" data/warehouse/mlb \
            --transfers 8 \
            --progress \
            --stats-one-line
          echo "Local files: $(find data/warehouse/mlb -type f | wc -l)"

      - name: Run warehouse ingestion
        run: |
          # Manual run with empty season → use MLB_SEASON (2026). Scheduled → MLB_SEASON.
          if [[ -n "${{ github.event.inputs.season }}" ]]; then
            SEASON="${{ github.event.inputs.season }}"
          else
            SEASON="${MLB_SEASON}"
          fi
          echo "SEASON=$SEASON" >> "$GITHUB_ENV"
          echo "Using season: $SEASON (regular season, game-type R)"

          ARGS=(--season "$SEASON" --game-type R)
          if [[ -n "${{ github.event.inputs.date }}" ]]; then
            ARGS+=(--dates "${{ github.event.inputs.date }}")
          else
            DAYS="${{ github.event.inputs.last_days }}"
            ARGS+=(--last-days "${DAYS:-1}")
          fi
          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then
            ARGS+=(--force)
          fi
          ARGS+=(--quiet)

          echo "Running: python -m src.ingestion.load_mlb_warehouse ${ARGS[*]}"
          python -m src.ingestion.load_mlb_warehouse "${ARGS[@]}"

      - name: Sync warehouse to Google Drive
        if: always()
        run: |
          if [ ! -f ~/.config/rclone/rclone.conf ]; then
            echo "::warning::Skipping Drive push: rclone was not configured."
            exit 0
          fi
          REMOTE="${RCLONE_REMOTE}:${GDRIVE_WAREHOUSE_PATH}"
          echo "Pushing warehouse to ${REMOTE} ..."
          rclone sync data/warehouse/mlb "$REMOTE" \
            --transfers 8 \
            --progress \
            --stats-one-line
          echo "Sync complete."

      - name: Print summary
        run: |
          YEAR="${SEASON:-$(date -u +%Y)}"
          RAW="data/warehouse/mlb/$YEAR/regular_season/raw"
          PARQ="data/warehouse/mlb/$YEAR/regular_season/pitches_enriched"
          echo "=== Warehouse snapshot (season $YEAR) ==="
          echo "Drive path: ${GDRIVE_WAREHOUSE_PATH}/$YEAR/regular_season/..."
          [ -d "$RAW" ]  && echo "Raw files:     $(find "$RAW" -type f 2>/dev/null | wc -l | tr -d ' ')" || echo "Raw dir not found"
          [ -d "$PARQ" ] && echo "Parquet files: $(find "$PARQ" -type f 2>/dev/null | wc -l | tr -d ' ')" || echo "Parquet dir not found"
          echo "Completed: $(date -u)"
